  <style>
    .drag-over {
      border: 2px dashed #3b82f6 !important;
      background-color: #eff6ff !important;
    }
    .card-column {
      min-height: 400px;
    }
    
    /* フォント設定 */
    /* ゴシック系 */
    .font-gothic {
      font-family: "游ゴシック体", "Yu Gothic", YuGothic, "ヒラギノ角ゴシック Pro", "Hiragino Kaku Gothic Pro", "MS Pゴシック", sans-serif;
    }
    .font-meiryo {
      font-family: "メイリオ", Meiryo, "ヒラギノ角ゴ ProN", sans-serif;
    }
    .font-noto-sans {
      font-family: "Noto Sans JP", sans-serif;
    }
    
    /* 明朝系 */
    .font-mincho {
      font-family: "游明朝", "Yu Mincho", YuMincho, "Hiragino Mincho ProN", "Hiragino Mincho Pro", "HG明朝E", "MS P明朝", "MS 明朝", serif;
    }
    .font-noto-serif {
      font-family: "Noto Serif JP", serif;
    }
    
    /* 変わり種 */
    .font-maru {
      font-family: "Zen Maru Gothic", "M PLUS Rounded 1c", "Kosugi Maru", sans-serif;
    }
    .font-klee {
      font-family: "Klee One", cursive;
    }
    
    /* 没入型エディタ */
    .immersive-editor {
      background: linear-gradient(to bottom, #faf9f7 0%, #f5f3f0 100%);
      height: 100vh;
      overflow: hidden;
    }
    .dark .immersive-editor {
      background: linear-gradient(to bottom, #1a1a1a 0%, #0f0f0f 100%);
    }
    
    .writing-area {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 60px 40px 60px;
      line-height: 2;
      font-size: 18px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 目に優しい文字色 */
    .text-comfortable-light {
      color: #374151;
    }
    .text-comfortable-dark {
      color: #d1d5db;
    }
    
    /* コンテンツ用フォント適用（UIは除外） */
    .font-content {
      /* JavaScriptで動的に適用される */
    }
    
    /* ダークモード */
    .dark {
      color-scheme: dark;
    }

  <div id="root"><div class="flex h-screen bg-gray-900"><button class="md:hidden fixed top-4 left-4 z-50 p-2 rounded-lg bg-gray-800 text-white shadow-lg">☰</button><div class="w-64 bg-gray-800 border-gray-700 border-r flex flex-col hidden md:flex"><div class="p-4 border-b border-gray-700"><h1 class="text-xl font-bold text-white">Novel Writer</h1><p class="text-xs text-gray-400 mt-1">最強魔術師と悪魔になりたくない悪役令嬢</p></div><nav class="flex-1 p-4"><div class="space-y-1"><button class="w-full text-left px-4 py-2 rounded-lg transition bg-blue-900 text-blue-200 font-medium">テーマ</button><button class="w-full text-left px-4 py-2 rounded-lg transition text-gray-300 hover:bg-gray-700">プロット</button><button class="w-full text-left px-4 py-2 rounded-lg transition text-gray-300 hover:bg-gray-700">編集</button><button class="w-full text-left px-4 py-2 rounded-lg transition text-gray-300 hover:bg-gray-700">登場人物</button><button class="w-full text-left px-4 py-2 rounded-lg transition text-gray-300 hover:bg-gray-700">世界観</button></div></nav><div class="p-4 border-t border-gray-700 space-y-2"><button class="w-full px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition text-sm text-white">⚙️ 設定</button><button class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">新規作品</button><button class="w-full px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition text-sm">エクスポート</button><label class="w-full px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition text-sm block text-center cursor-pointer">インポート<input type="file" accept=".json" class="hidden"></label></div></div><div class="flex-1 overflow-auto"><div class="p-8"><h2 class="text-2xl font-bold mb-6 text-white">テーマ設定</h2><div class="max-w-4xl mx-auto space-y-6"><div><label class="block text-sm font-medium mb-2 text-gray-300">作品タイトル</label><input type="text" class="w-full px-4 py-2 bg-transparent border-0 focus:outline-none font-mincho text-white" placeholder="作品タイトルを入力" value="最強魔術師と悪魔になりたくない悪役令嬢"></div><div><label class="block text-sm font-medium mb-2 text-gray-300">テーマ・コンセプト</label><textarea class="w-full px-4 py-2 bg-transparent border-0 focus:outline-none resize-none overflow-hidden font-mincho text-comfortable-dark" placeholder="物語のテーマや伝えたいメッセージを記述してください" style="min-height: 200px; line-height: 1.8; height: 2550px;">アークレイ王国。大陸で最も魔力が潤沢な土地に座するこの王国には、王国を守護する女神がいる。
女神は自然を愛し、民を愛し、魔術を愛した。
潤沢な魔力が地表奥深くから湧き出るこの国では、子どものほとんどが魔力を宿して産まれる。
そして魔力を有した子どもが７歳を迎えたとき、子どもは神殿へと赴き、女神のギフトを受けることができる。
このギフトは女神の声を聞ける一生に一度きりの機会であり、奇跡である。

といっても、女神と会話できるわけではない。
女神からどういった内容のギフトが授けられたのかを知らされる程度で、しかしその声はまさに神々しさと慈しみに満ちており、この国においての女神信仰が他国の宗教に比べて非常に高いのも、実際に神の存在に触れられるからこそといって過言ではない。

与えられるギフトは子によって様々である。
魔力の上昇、属性の付与、幸運値の上昇──その子の適正によってその内容は変わると言われている。

侯爵令嬢であるアリアもまた、魔力を有して産まれ、７歳で女神のギフトを受け取った。
だが、彼女の場合、少し毛色は違った。
与えられたギフトは幸運値の上昇。割合的に多いギフトである。しかし、彼女の受け取ったギフトが特殊だったのは、ここからである。
女神はギフトの内容に触れたあと、アリアの運命について語った。

「あなた、少し特殊な星の巡りをしているわ。このままだと『悪魔』にされてしまうわよ」

──えっ！？

女神の像に向かってひざまずき、両手を組んでいたアリアは驚き、肩を跳ね上がらせる。

「あなたはこれから、運命の星に出会う。それが始まり。あなたが何を選び、何を拾い上げるのか──その選択によって、あなたの運命は大きく変わる」

「目を曇らせぬよう励みなさい。でないと……大事なものをこぼれ落とすことになる。
まあ、悪魔になることが必ずしもあなたの不幸にはならないかもしれないけれど」

少しの笑い声を残して、声が消える。それから二度と、女神の声がアリアに届くことはなかった。
しかし、アリアはそれどころではない、わなわなと唇を震わせ、その顔面は蒼白になっている。

──何？　なんて？　悪魔？　私が？　なんで！？

意味がわからない。意味がわからないが、女神は言った。『目を曇らせぬよう努めろ』と。

アリアはかくして、暗い未来しかない先を少しでも良くしようと奮闘するのである。

---
（旧）決めてる設定：
お助けキャラであるテオバルトは攻略対象ではない。
類を見ない魔術の腕と魔力、そしてどこか陰のある美丈夫であるが、それでも攻略対象ではないので、アリアの前世にてユーザーは「なぜ攻略できないんだ」と嘆いていたくらいのキャラクターである。
このテオバルト、アリアのことが好きである。
元々平民で、その魔力の高さから魔法省が管轄する魔術師たちの総本山である塔に売られ（金と引き換えに塔の人間がテオバルトをほしがり、良心はその大金に目がくらんでテオバルトをあっさり引き渡した）、そこで努力しなければ死ぬしかない過酷な環境に置かれ、魔術師としての腕を否応なしに高められた。
弱冠12歳で魔術師として最高位の位につき、誰も彼もがテオバルトを恐れた。
その頃にはもういろんなことがどうでもよくなっていた。
そして同じく12歳のとき、アリアと貴族主催のお茶会で会う。
その日、テオバルトは自分の師である男に連れられて、貴族へ顔見せに出ていたのである。師曰く、せっかく力があるのだから顔を売っておいて損は無い。使えるものは使えばいいし、金になりそうなら金にしろ、とのことだったが、テオバルトはすべてがどうでもよくなっていたので、本当にどうでもよかった。
アリアに会ったのは、煩わしい挨拶から逃れようとお茶会の会場である庭園の隅に逃げ込んだときである。アリアは隅で、本を読んでいた。
目が合うと、アリアは怯えのない目でテオバルトに微笑み、挨拶をした。
怯えられないのは久しぶりで、でもどうせこいつも自分が名乗ったら、自分の魔力を見たら怯え、下手すれば媚びへつらうんだろうと思う。なのでテオバルトは率先して名乗った。
しかしアリアはテオバルトの正体を知り、驚いた顔こそ見せたものの、怯えたり、才能があっていいですねなんて聞き飽きた言葉も言わなかった。
「私、色々事情がありまして、一番得意な回復魔法を極めたいと思ってるのです。テオバルト様、私の魔法、一度見てもらえませんか？　アドバイスなどありましたら……うれしいのですけど」
アリアが見せた回復魔法は、12歳の平凡な魔力の持ち主としては強く優しい力だった。アリアが口だけではなく頑張っていることに気づいたテオバルトは、今の努力のやりかたで間違ってないけど、魔力を底上げしたいなら一度枯渇寸前まで魔力放出するといいなどと一般ではあまり有用でないアドバイス（枯渇寸前まで魔力放出したら普通はぶっ倒れて最悪死ぬ）を交えいくつか話す。アリアは感心した様子で「そんなにも過酷な魔術訓練を行っているのですか。テオバルト様はすごいですね。私も見習わねばなりませんね」と鼻息荒くふんすふんすしている。お世辞ではなく、へつらいではなく、アリアはもう次にやるべき訓練についてああだこうだと話している。
テオバルトは、自分が「才能」でここまで来たのではなく、「努力」をずっと続けてきたことを、本当に死んでしまいそうにつらかったことを認められ、褒められ、尊敬すると言ってくれたアリアに、心を救われた心地になった。
--
ハーレムエンドにて、テオバルトが「封印した」と言っているのは実は嘘である。裏設定として、テオバルトはアリアを自分の屋敷に囲い、外に出さないようにしたあとで「魔物だったから封印した」と嘘をついているのである。
--
アリアはヒロインがどのルートに行くのかやきもきしつつヒロインをとりあえず見守るしかできないでいるが、今回の話はハーレムエンドっぽい流れに進む。
アリアに婚約者はできず、「このままだと私、魔物に……！？　いやでも、私別にヒロインに悪感情抱いてないし！　みんな友だちならそれはそれでいいよ！　私、嫉妬とかしないから！　悪魔エンドだけはやめて！」と思っているし、テオバルトのことはお助けキャラである以上完全な味方ではないかもと信用しきれずにいたが、テオバルトは真実アリアのことしか考えていないので、アリアもだんだん絆されていく。
--
裏設定として、ゲーム内でお助けキャラとして動いているのも、アリアと婚約者を接近させないためにヒロインに「あっちに攻略対象いたよ。アリアは俺が引き留めておくよ」などと言っているだけである。これは裏設定であり、ユーザーは誰も気づいていなかった。
</textarea></div></div></div></div></div></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // フォント設定を取得する関数
    const getFontClass = (fontFamily) => {
      const fontMap = {
        'gothic': 'font-gothic',
        'meiryo': 'font-meiryo',
        'noto-sans': 'font-noto-sans',
        'mincho': 'font-mincho',
        'noto-serif': 'font-noto-serif',
        'maru': 'font-maru',
        'klee': 'font-klee'
      };
      return fontMap[fontFamily] || 'font-gothic';
    };

    // 初期データ構造
    const initialProject = {
      id: Date.now(),
      title: '新規作品',
      theme: '',
      characters: [],
      plot: {
        起: [],
        承: [],
        転: [],
        結: []
      },
      worldSettings: [],
      manuscripts: []
    };

    function App() {
      const [projects, setProjects] = useState([]);
      const [currentProject, setCurrentProject] = useState(null);
      const [activeTab, setActiveTab] = useState('テーマ');
      const [draggedCard, setDraggedCard] = useState(null);
      const [darkMode, setDarkMode] = useState(false);
      const [fontFamily, setFontFamily] = useState('gothic');
      const [lineHeight, setLineHeight] = useState(1.8);
      const [showSettings, setShowSettings] = useState(false);
      const [immersiveMode, setImmersiveMode] = useState(false);
      const [showMobileMenu, setShowMobileMenu] = useState(false);

      // 初期化
      useEffect(() => {
        const savedProjects = localStorage.getItem('novelWriterProjects');
        const savedDarkMode = localStorage.getItem('novelWriterDarkMode');
        const savedFont = localStorage.getItem('novelWriterFont');
        const savedLineHeight = localStorage.getItem('novelWriterLineHeight');
        
        if (savedDarkMode) setDarkMode(savedDarkMode === 'true');
        if (savedFont) setFontFamily(savedFont);
        if (savedLineHeight) setLineHeight(parseFloat(savedLineHeight));
        
        if (savedProjects) {
          const parsed = JSON.parse(savedProjects);
          setProjects(parsed);
          if (parsed.length > 0) {
            setCurrentProject(parsed[0]);
          }
        } else {
          const newProject = { ...initialProject };
          setProjects([newProject]);
          setCurrentProject(newProject);
        }

        // URLパラメータチェック（新しいタブで開いた場合）
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('immersive') === 'true') {
          setActiveTab('編集');
          setImmersiveMode(true);
          
          // chapterIdがあれば、そのチapterを選択状態にする処理は
          // ManuscriptTabコンポーネント側で行う
        }
      }, []);

      // 保存
      useEffect(() => {
        if (projects.length > 0) {
          localStorage.setItem('novelWriterProjects', JSON.stringify(projects));
        }
      }, [projects]);

      // 他のタブでの変更を検知してリアルタイム同期
      useEffect(() => {
        const handleStorageChange = (e) => {
          if (e.key === 'novelWriterProjects' && e.newValue) {
            const parsed = JSON.parse(e.newValue);
            setProjects(parsed);
            
            // 現在のプロジェクトを更新
            if (currentProject) {
              const updated = parsed.find(p => p.id === currentProject.id);
              if (updated) {
                setCurrentProject(updated);
              }
            }
          }
        };

        window.addEventListener('storage', handleStorageChange);
        return () => window.removeEventListener('storage', handleStorageChange);
      }, [currentProject]);

      // 設定保存
      useEffect(() => {
        localStorage.setItem('novelWriterDarkMode', darkMode);
        localStorage.setItem('novelWriterFont', fontFamily);
        localStorage.setItem('novelWriterLineHeight', lineHeight.toString());
        
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode, fontFamily, lineHeight]);

      // プロジェクト更新
      const updateCurrentProject = (updates) => {
        const updatedProject = { ...currentProject, ...updates };
        setCurrentProject(updatedProject);
        setProjects(projects.map(p => p.id === updatedProject.id ? updatedProject : p));
      };

      // 新規プロジェクト作成
      const createNewProject = () => {
        const newProject = { ...initialProject, id: Date.now() };
        setProjects([...projects, newProject]);
        setCurrentProject(newProject);
      };

      // エクスポート
      const exportData = () => {
        // 現在の日時を取得してファイル名に使用
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const filename = `novel-writer_${year}${month}${day}_${hours}${minutes}.json`;
        
        const dataStr = JSON.stringify(projects, null, 2);
        
        // Androidでもファイル名が正しく付くようにData URLを使用
        const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
        
        const link = document.createElement('a');
        link.href = dataUri;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // インポート
      const importData = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const imported = JSON.parse(event.target.result);
              setProjects(imported);
              if (imported.length > 0) {
                setCurrentProject(imported[0]);
              }
            } catch (error) {
              alert('データの読み込みに失敗しました');
            }
          };
          reader.readAsText(file);
        }
      };

      if (!currentProject) {
        return <div className="flex items-center justify-center h-screen">読み込み中...</div>;
      }

      return (
        <div className={`flex h-screen ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
          {/* モバイル用ハンバーガーメニューボタン */}
          {!immersiveMode && (
            <button
              onClick={() => setShowMobileMenu(true)}
              className={`md:hidden fixed top-4 left-4 z-50 p-2 rounded-lg ${darkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-800'} shadow-lg`}
            >
              ☰
            </button>
          )}

          {/* モバイル用オーバーレイサイドバー */}
          {!immersiveMode && showMobileMenu && (
            <>
              <div
                className="md:hidden fixed inset-0 bg-black bg-opacity-50 z-40"
                onClick={() => setShowMobileMenu(false)}
              />
              <div className={`md:hidden fixed left-0 top-0 bottom-0 w-64 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} border-r z-50 flex flex-col overflow-y-auto`}>
                <div className="flex justify-end p-4">
                  <button
                    onClick={() => setShowMobileMenu(false)}
                    className={`${darkMode ? 'text-gray-400 hover:text-white' : 'text-gray-600 hover:text-gray-800'}`}
                  >
                    ✕
                  </button>
                </div>
                
                {/* サイドバーコンテンツ（以下のコードをコピー） */}
                <div className="px-4 pb-4 flex-1">
                  <h1 className={`text-2xl font-bold mb-2 ${darkMode ? 'text-white' : 'text-gray-800'}`}>{currentProject?.title || 'Novel Writer'}</h1>
                  <p className={`text-sm mb-6 ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{currentProject?.theme?.substring(0, 50) || '最強魔術師と愚鈍になりたくない選択'}{currentProject?.theme?.length > 50 ? '...' : ''}</p>
                  
                  <nav className="space-y-1 mb-6">
                    {['テーマ', 'プロット', '編集', '登場人物', '世界観'].map((tab) => (
                      <button
                        key={tab}
                        onClick={() => {
                          setActiveTab(tab);
                          setShowMobileMenu(false);
                        }}
                        className={`w-full text-left px-4 py-2 rounded-lg transition ${
                          activeTab === tab
                            ? darkMode ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600'
                            : darkMode ? 'text-gray-300 hover:bg-gray-700' : 'text-gray-700 hover:bg-gray-100'
                        }`}
                      >
                        {tab}
                      </button>
                    ))}
                  </nav>

                  <button
                    onClick={() => {
                      setShowSettings(true);
                      setShowMobileMenu(false);
                    }}
                    className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'} rounded-lg transition text-sm mb-4 flex items-center justify-center gap-2`}
                  >
                    ⚙️ 設定
                  </button>

                  <div className="space-y-2">
                    <button
                      onClick={() => {
                        createNewProject();
                        setShowMobileMenu(false);
                      }}
                      className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
                    >
                      新規作品
                    </button>
                    <button
                      onClick={() => {
                        exportData();
                        setShowMobileMenu(false);
                      }}
                      className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-600 hover:bg-gray-700'} text-white rounded-lg transition text-sm`}
                    >
                      エクスポート
                    </button>
                    <label className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-600 hover:bg-gray-700'} text-white rounded-lg transition text-sm block text-center cursor-pointer`}>
                      インポート
                      <input type="file" accept=".json" onChange={(e) => {
                        importData(e);
                        setShowMobileMenu(false);
                      }} className="hidden" />
                    </label>
                  </div>
                </div>
              </div>
            </>
          )}

          {/* サイドバー - 没入モード時は非表示、狭い画面では隠す */}
          {!immersiveMode && (
            <div className={`w-64 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} border-r flex flex-col hidden md:flex`}>
            <div className={`p-4 border-b ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
              <h1 className={`text-xl font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>Novel Writer</h1>
              <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'} mt-1`}>{currentProject.title}</p>
            </div>

            <nav className="flex-1 p-4">
              <div className="space-y-1">
                {['テーマ', 'プロット', '編集', '登場人物', '世界観'].map((tab) => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`w-full text-left px-4 py-2 rounded-lg transition ${
                      activeTab === tab
                        ? darkMode 
                          ? 'bg-blue-900 text-blue-200 font-medium'
                          : 'bg-blue-50 text-blue-600 font-medium'
                        : darkMode
                          ? 'text-gray-300 hover:bg-gray-700'
                          : 'text-gray-700 hover:bg-gray-50'
                    }`}
                  >
                    {tab}
                  </button>
                ))}
              </div>
            </nav>

            <div className={`p-4 border-t ${darkMode ? 'border-gray-700' : 'border-gray-200'} space-y-2`}>
              <button
                onClick={() => setShowSettings(!showSettings)}
                className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'} rounded-lg transition text-sm ${darkMode ? 'text-white' : 'text-gray-700'}`}
              >
                ⚙️ 設定
              </button>
              <button
                onClick={createNewProject}
                className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
              >
                新規作品
              </button>
              <button
                onClick={exportData}
                className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-600 hover:bg-gray-700'} text-white rounded-lg transition text-sm`}
              >
                エクスポート
              </button>
              <label className={`w-full px-4 py-2 ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-600 hover:bg-gray-700'} text-white rounded-lg transition text-sm block text-center cursor-pointer`}>
                インポート
                <input type="file" accept=".json" onChange={importData} className="hidden" />
              </label>
            </div>
          </div>
          )}

          {/* 設定モーダル */}
          {showSettings && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={() => setShowSettings(false)}>
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg p-6 max-w-md w-full mx-4`} onClick={(e) => e.stopPropagation()}>
                <h3 className={`text-xl font-bold mb-4 ${darkMode ? 'text-white' : 'text-gray-800'}`}>設定</h3>
                
                <div className="space-y-4">
                  <div>
                    <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      テーマ
                    </label>
                    <div className="flex gap-2">
                      <button
                        onClick={() => setDarkMode(false)}
                        className={`flex-1 px-4 py-2 rounded-lg ${!darkMode ? 'bg-blue-600 text-white' : darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-700'}`}
                      >
                        ☀️ ライト
                      </button>
                      <button
                        onClick={() => setDarkMode(true)}
                        className={`flex-1 px-4 py-2 rounded-lg ${darkMode ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}`}
                      >
                        🌙 ダーク
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      フォント
                    </label>
                    <select
                      value={fontFamily}
                      onChange={(e) => setFontFamily(e.target.value)}
                      className={`w-full px-4 py-2 rounded-lg border ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : 'bg-white border-gray-300 text-gray-700'}`}
                    >
                      <optgroup label="ゴシック系">
                        <option value="gothic">游ゴシック</option>
                        <option value="meiryo">メイリオ</option>
                        <option value="noto-sans">Noto Sans JP</option>
                      </optgroup>
                      <optgroup label="明朝系">
                        <option value="mincho">游明朝</option>
                        <option value="noto-serif">Noto Serif JP</option>
                      </optgroup>
                      <optgroup label="変わり種">
                        <option value="maru">丸ゴシック（Zen Maru）</option>
                        <option value="klee">手書き風（Klee One）</option>
                      </optgroup>
                    </select>
                  </div>

                  <div>
                    <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      行間
                    </label>
                    <div className="flex items-center gap-4">
                      <input
                        type="range"
                        min="1.0"
                        max="2.5"
                        step="0.1"
                        value={lineHeight}
                        onChange={(e) => setLineHeight(parseFloat(e.target.value))}
                        className="flex-1"
                      />
                      <span className={`text-sm w-12 text-right ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                        {lineHeight.toFixed(1)}
                      </span>
                    </div>
                  </div>
                </div>

                <button
                  onClick={() => setShowSettings(false)}
                  className="mt-6 w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                >
                  閉じる
                </button>
              </div>
            </div>
          )}

          {/* メインコンテンツ */}
          <div className="flex-1 overflow-auto">
            {activeTab === 'テーマ' && (
              <ThemeTab project={currentProject} updateProject={updateCurrentProject} darkMode={darkMode} fontFamily={fontFamily} lineHeight={lineHeight} />
            )}
            {activeTab === 'プロット' && (
              <PlotTab
                project={currentProject}
                updateProject={updateCurrentProject}
                draggedCard={draggedCard}
                setDraggedCard={setDraggedCard}
                darkMode={darkMode}
                fontFamily={fontFamily}
              />
            )}
            {activeTab === '編集' && (
              <ManuscriptTab 
                project={currentProject} 
                updateProject={updateCurrentProject} 
                darkMode={darkMode} 
                fontFamily={fontFamily}
                lineHeight={lineHeight}
                immersiveMode={immersiveMode}
                setImmersiveMode={setImmersiveMode}
              />
            )}
            {activeTab === '登場人物' && (
              <CharacterTab project={currentProject} updateProject={updateCurrentProject} darkMode={darkMode} fontFamily={fontFamily} />
            )}
            {activeTab === '世界観' && (
              <WorldTab project={currentProject} updateProject={updateCurrentProject} darkMode={darkMode} fontFamily={fontFamily} lineHeight={lineHeight} />
            )}
          </div>
        </div>
      );
    }

    // テーマタブ
    function ThemeTab({ project, updateProject, darkMode, fontFamily, lineHeight }) {
      const textareaRef = useRef(null);
      const fontClass = getFontClass(fontFamily);

      // テキストエリアの高さを自動調整する関数（スクロール位置を保持）
      const adjustTextareaHeight = () => {
        const textarea = textareaRef.current;
        if (textarea) {
          // スクロール位置を保存（親のoverflow-autoコンテナ）
          const scrollContainer = textarea.closest('.overflow-auto');
          const scrollTop = scrollContainer ? scrollContainer.scrollTop : 0;
          
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
          
          // スクロール位置を復元
          if (scrollContainer) {
            scrollContainer.scrollTop = scrollTop;
          }
        }
      };

      // 初期表示時とproject.themeが変更された時に高さを調整
      useEffect(() => {
        adjustTextareaHeight();
      }, [project.theme]);

      return (
        <div className="p-8">
          <h2 className={`text-2xl font-bold mb-6 ${darkMode ? 'text-white' : 'text-gray-800'}`}>テーマ設定</h2>

          <div className="max-w-4xl mx-auto space-y-6">
            <div>
              <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                作品タイトル
              </label>
              <input
                type="text"
                value={project.title}
                onChange={(e) => updateProject({ title: e.target.value })}
                className={`w-full px-4 py-2 bg-transparent border-0 focus:outline-none ${fontClass} ${darkMode ? 'text-white' : 'text-gray-800'}`}
                placeholder="作品タイトルを入力"
              />
            </div>

            <div>
              <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                テーマ・コンセプト
              </label>
              <textarea
                ref={textareaRef}
                value={project.theme}
                onChange={(e) => {
                  updateProject({ theme: e.target.value });
                  adjustTextareaHeight();
                }}
                className={`w-full px-4 py-2 bg-transparent border-0 focus:outline-none resize-none overflow-hidden ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}
                style={{ minHeight: '200px', lineHeight: lineHeight }}
                placeholder="物語のテーマや伝えたいメッセージを記述してください"
              />
            </div>
          </div>
        </div>
      );
    }

    // プロットタブ
    function PlotTab({ project, updateProject, draggedCard, setDraggedCard, darkMode, fontFamily }) {
      const sections = ['起', '承', '転', '結'];
      const [isEditing, setIsEditing] = useState(false);
      const [viewMode, setViewMode] = useState('grid'); // 'grid' or 'tab'
      const [activeSection, setActiveSection] = useState('起'); // タブ表示時のアクティブセクション
      const [editingCard, setEditingCard] = useState(null); // { section, card }
      const [modalText, setModalText] = useState('');
      const fontClass = getFontClass(fontFamily);

      const openModal = (section, card) => {
        setEditingCard({ section, card });
        setModalText(card.text);
      };

      const closeModal = () => {
        setEditingCard(null);
        setModalText('');
      };

      const saveModal = () => {
        if (editingCard) {
          updateCard(editingCard.section, editingCard.card.id, modalText);
          closeModal();
        }
      };

      const addCard = (section) => {
        const newPlot = { ...project.plot };
        newPlot[section].push({
          id: Date.now(),
          text: ''
        });
        updateProject({ plot: newPlot });
      };

      const updateCard = (section, cardId, text) => {
        const newPlot = { ...project.plot };
        const cardIndex = newPlot[section].findIndex(c => c.id === cardId);
        if (cardIndex !== -1) {
          newPlot[section][cardIndex].text = text;
          updateProject({ plot: newPlot });
        }
      };

      const deleteCard = (section, cardId) => {
        const newPlot = { ...project.plot };
        newPlot[section] = newPlot[section].filter(c => c.id !== cardId);
        updateProject({ plot: newPlot });
      };

      const handleDragStart = (section, card) => {
        setDraggedCard({ section, card });
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (targetSection) => {
        if (!draggedCard) return;

        const newPlot = { ...project.plot };
        
        newPlot[draggedCard.section] = newPlot[draggedCard.section].filter(
          c => c.id !== draggedCard.card.id
        );
        
        newPlot[targetSection].push(draggedCard.card);
        
        updateProject({ plot: newPlot });
        setDraggedCard(null);
      };

      const exportPlotToTxt = () => {
        let content = `【${project.title} - プロット】\n\n`;
        sections.forEach(section => {
          content += `■ ${section}\n`;
          project.plot[section].forEach((card, index) => {
            content += `${index + 1}. ${card.text}\n`;
          });
          content += '\n';
        });
        
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${project.title}_プロット.txt`;
        link.click();
      };

      const importPlotFromTxt = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const text = event.target.result;
            // 簡易的なパース（セクション単位で分割）
            const newPlot = { 起: [], 承: [], 転: [], 結: [] };
            let currentSection = null;
            
            text.split('\n').forEach(line => {
              const sectionMatch = line.match(/^■\s*([起承転結])/);
              if (sectionMatch) {
                currentSection = sectionMatch[1];
              } else if (currentSection && line.match(/^\d+\.\s+(.+)/)) {
                const content = line.replace(/^\d+\.\s+/, '');
                newPlot[currentSection].push({
                  id: Date.now() + Math.random(),
                  text: content
                });
              }
            });
            
            updateProject({ plot: newPlot });
          };
          reader.readAsText(file, 'UTF-8');
        }
      };

      return (
        <div className="p-8">
          <div className="flex justify-between items-center mb-6">
            <h2 className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>プロット作成</h2>
            <div className="flex gap-2">
              {isEditing && (
                <button
                  onClick={() => setViewMode(viewMode === 'grid' ? 'tab' : 'grid')}
                  className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-600 hover:bg-gray-700' : 'bg-gray-600 hover:bg-gray-700'} text-white`}
                >
                  {viewMode === 'grid' ? '📑 タブ表示' : '🔲 全体表示'}
                </button>
              )}
              <button
                onClick={() => setIsEditing(!isEditing)}
                className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-600 hover:bg-blue-700'} text-white`}
              >
                {isEditing ? '✓ 確認モード' : '✏️ 編集モード'}
              </button>
              <button
                onClick={exportPlotToTxt}
                className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
              >
                📄 TXT出力
              </button>
              <label className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm cursor-pointer">
                📥 TXT読込
                <input type="file" accept=".txt" onChange={importPlotFromTxt} className="hidden" />
              </label>
            </div>
          </div>

          {isEditing ? (
            /* 編集モード */
            <>
              {viewMode === 'tab' && (
                /* タブナビゲーション */
                <div className="flex gap-2 mb-4">
                  {sections.map((section) => (
                    <button
                      key={section}
                      onClick={() => setActiveSection(section)}
                      className={`px-6 py-3 rounded-lg font-bold transition ${
                        activeSection === section
                          ? darkMode ? 'bg-blue-600 text-white' : 'bg-blue-600 text-white'
                          : darkMode ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                      }`}
                    >
                      {section}
                    </button>
                  ))}
                </div>
              )}

              <div className={viewMode === 'grid' ? 'grid grid-cols-4 gap-4' : ''}>
                {(viewMode === 'grid' ? sections : [activeSection]).map((section) => (
                  <div
                    key={section}
                    className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow`}
                    onDragOver={handleDragOver}
                    onDrop={() => handleDrop(section)}
                >
                  <div className={`p-4 border-b rounded-t-lg ${darkMode ? 'border-gray-700 bg-gray-700' : 'border-gray-200 bg-gray-50'}`}>
                    <h3 className={`font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>- {section} -</h3>
                  </div>

                  <div className="p-4 space-y-3 card-column">
                    {project.plot[section].map((card) => (
                      <div
                        key={card.id}
                        draggable
                        onDragStart={() => handleDragStart(section, card)}
                        onDoubleClick={() => openModal(section, card)}
                        className={`p-3 rounded-lg border cursor-move hover:shadow-md transition group relative ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-gray-50 border-gray-200'}`}
                      >
                        <div className={`text-sm whitespace-pre-wrap ${fontClass} ${darkMode ? 'text-white' : 'text-gray-800'}`}>
                          {card.text || <span className="text-gray-400 italic">ダブルクリックで編集...</span>}
                        </div>
                        <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100">
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              openModal(section, card);
                            }}
                            className="text-blue-500 hover:text-blue-700 transition text-xs"
                          >
                            ✏️
                          </button>
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              deleteCard(section, card.id);
                            }}
                            className="text-red-500 hover:text-red-700 transition text-xs"
                          >
                            ✕
                          </button>
                        </div>
                      </div>
                    ))}
                    
                    <button
                      onClick={() => addCard(section)}
                      className={`w-full py-2 text-sm border border-dashed rounded-lg transition ${darkMode ? 'text-gray-400 hover:text-gray-300 border-gray-600 hover:border-gray-500' : 'text-gray-500 hover:text-gray-700 border-gray-300 hover:border-gray-400'}`}
                    >
                      + カード追加
                    </button>
                  </div>
                </div>
              ))}
              </div>
            </>
          ) : (
            /* 確認モード - リスト形式 */
            <div className="max-w-4xl mx-auto">
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-8 space-y-8`}>
                {sections.map((section) => (
                  <div key={section}>
                    <h3 className={`text-xl font-bold ${darkMode ? 'text-gray-300' : 'text-gray-800'} mb-4 pb-2 border-b ${darkMode ? 'border-gray-600' : 'border-gray-200'}`}>
                      ■ {section}
                    </h3>
                    {project.plot[section].length > 0 ? (
                      <div className="space-y-3">
                        {project.plot[section].map((card, index) => (
                          <div key={card.id} className={`pl-6 ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}>
                            <span className={`font-bold ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{index + 1}. </span>
                            <span className="whitespace-pre-wrap leading-relaxed">{card.text}</span>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className={`pl-6 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                        プロットが入力されていません
                      </div>
                    )}
                  </div>
                ))}

                {sections.every(section => project.plot[section].length === 0) && (
                  <div className={`text-center py-12 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                    右上の「✏️ 編集モード」ボタンからプロットを入力してください
                  </div>
                )}
              </div>
            </div>
          )}

          {/* モーダルウィンドウ */}
          {editingCard && (
            <div 
              className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
              onClick={closeModal}
            >
              <div 
                className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow-2xl w-full max-w-3xl mx-4`}
                onClick={(e) => e.stopPropagation()}
              >
                <div className={`p-6 border-b ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                  <h3 className={`text-xl font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>
                    プロット編集 - {editingCard.section}
                  </h3>
                </div>
                
                <div className="p-6">
                  <textarea
                    value={modalText}
                    onChange={(e) => setModalText(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === 'Escape') closeModal();
                      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveModal();
                    }}
                    className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none ${fontClass} ${darkMode ? 'bg-gray-700 border-gray-600 text-comfortable-dark' : 'border-gray-300 text-comfortable-light'}`}
                    rows="12"
                    placeholder="プロットを入力してください..."
                    autoFocus
                  />
                  <p className={`text-xs mt-2 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                    ヒント: Ctrl+Enter で保存 / ESC で閉じる
                  </p>
                </div>
                
                <div className={`p-6 border-t flex justify-end gap-3 ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                  <button
                    onClick={closeModal}
                    className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-700 hover:bg-gray-600 text-white' : 'bg-gray-200 hover:bg-gray-300 text-gray-800'}`}
                  >
                    キャンセル
                  </button>
                  <button
                    onClick={saveModal}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg"
                  >
                    保存
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 原稿編集タブ
    function ManuscriptTab({ project, updateProject, darkMode, fontFamily, lineHeight, immersiveMode, setImmersiveMode }) {
      const [selectedChapter, setSelectedChapter] = useState(null);
      const [editingTitleId, setEditingTitleId] = useState(null);
      const [editingTitleText, setEditingTitleText] = useState('');
      const [fontSize, setFontSize] = useState(16);
      const [showSidebar, setShowSidebar] = useState(false);
      const [draggedChapter, setDraggedChapter] = useState(null);
      const textareaRef = useRef(null);
      const fontClass = getFontClass(fontFamily);

      // テキストエリアの高さを自動調整する関数（スクロール位置を保持）
      const adjustTextareaHeight = () => {
        const textarea = textareaRef.current;
        if (textarea) {
          // スクロール位置を保存
          const scrollContainer = textarea.closest('.overflow-auto');
          const scrollTop = scrollContainer ? scrollContainer.scrollTop : 0;
          
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
          
          // スクロール位置を復元
          if (scrollContainer) {
            scrollContainer.scrollTop = scrollTop;
          }
        }
      };

      // URLパラメータから章を自動選択
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const chapterId = urlParams.get('chapter');
        
        if (chapterId && project.manuscripts) {
          const chapter = project.manuscripts.find(m => m.id === parseInt(chapterId));
          if (chapter) {
            setSelectedChapter(chapter);
          }
        }
      }, [project.manuscripts]);

      // 別タブでの変更を反映（選択中の章を同期）
      useEffect(() => {
        if (selectedChapter && project.manuscripts) {
          const updated = project.manuscripts.find(m => m.id === selectedChapter.id);
          if (updated && JSON.stringify(updated) !== JSON.stringify(selectedChapter)) {
            setSelectedChapter(updated);
          }
        }
      }, [project.manuscripts]);

      // 別タブでの変更を反映（選択中の章を同期）
      useEffect(() => {
        if (selectedChapter && project.manuscripts) {
          const updated = project.manuscripts.find(m => m.id === selectedChapter.id);
          if (updated && JSON.stringify(updated) !== JSON.stringify(selectedChapter)) {
            setSelectedChapter(updated);
          }
        }
      }, [project.manuscripts]);

      // テキストエリアの高さを初期化・更新時に調整
      useEffect(() => {
        if (selectedChapter && !immersiveMode) {
          adjustTextareaHeight();
        }
      }, [selectedChapter?.content, immersiveMode]);

      const addChapter = () => {
        const newManuscripts = [...project.manuscripts];
        newManuscripts.push({
          id: Date.now(),
          title: `第${newManuscripts.length + 1}章`,
          content: ''
        });
        updateProject({ manuscripts: newManuscripts });
        setSelectedChapter(newManuscripts[newManuscripts.length - 1]);
      };

      const updateChapter = (chapterId, field, value) => {
        const newManuscripts = project.manuscripts.map(m =>
          m.id === chapterId ? { ...m, [field]: value } : m
        );
        updateProject({ manuscripts: newManuscripts });
        if (selectedChapter && selectedChapter.id === chapterId) {
          setSelectedChapter({ ...selectedChapter, [field]: value });
        }
      };

      const deleteChapter = (chapterId) => {
        const newManuscripts = project.manuscripts.filter(m => m.id !== chapterId);
        updateProject({ manuscripts: newManuscripts });
        if (selectedChapter && selectedChapter.id === chapterId) {
          setSelectedChapter(null);
        }
      };

      const startEditingTitle = (chapter) => {
        setEditingTitleId(chapter.id);
        setEditingTitleText(chapter.title);
      };

      const finishEditingTitle = () => {
        if (editingTitleId && editingTitleText.trim()) {
          updateChapter(editingTitleId, 'title', editingTitleText.trim());
        }
        setEditingTitleId(null);
        setEditingTitleText('');
      };

      const handleTitleKeyDown = (e) => {
        if (e.key === 'Enter') {
          finishEditingTitle();
        } else if (e.key === 'Escape') {
          setEditingTitleId(null);
          setEditingTitleText('');
        }
      };

      const handleDragStart = (chapter) => {
        setDraggedChapter(chapter);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (targetChapter) => {
        if (!draggedChapter || draggedChapter.id === targetChapter.id) return;

        const newManuscripts = [...project.manuscripts];
        const draggedIndex = newManuscripts.findIndex(c => c.id === draggedChapter.id);
        const targetIndex = newManuscripts.findIndex(c => c.id === targetChapter.id);

        newManuscripts.splice(draggedIndex, 1);
        const finalTargetIndex = draggedIndex < targetIndex ? targetIndex - 1 : targetIndex;
        newManuscripts.splice(finalTargetIndex, 0, draggedChapter);

        updateProject({ manuscripts: newManuscripts });
        setDraggedChapter(null);
      };

      const getCharCount = (text) => {
        return text.replace(/\s/g, '').length;
      };

      const exportChapterToTxt = () => {
        if (!selectedChapter) return;
        const content = `${selectedChapter.title}\n\n${selectedChapter.content}`;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${selectedChapter.title}.txt`;
        link.click();
      };

      const exportAllToTxt = () => {
        let content = `${project.title}\n\n`;
        project.manuscripts.forEach(chapter => {
          content += `\n\n${'='.repeat(50)}\n`;
          content += `${chapter.title}\n`;
          content += `${'='.repeat(50)}\n\n`;
          content += chapter.content;
        });
        
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${project.title}_全原稿.txt`;
        link.click();
      };

      const importChapterFromTxt = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const text = event.target.result;
            const title = file.name.replace('.txt', '');
            const content = text.trim();
            
            const newManuscripts = [...project.manuscripts];
            newManuscripts.push({
              id: Date.now(),
              title: title,
              content: content
            });
            updateProject({ manuscripts: newManuscripts });
            setSelectedChapter(newManuscripts[newManuscripts.length - 1]);
          };
          reader.readAsText(file, 'UTF-8');
        }
      };

      if (immersiveMode && selectedChapter) {
        return (
          <div className={`immersive-editor ${darkMode ? 'dark' : ''} relative ${fontClass}`}>
            {/* ハンバーガーメニューボタン */}
            <button
              onClick={() => setShowSidebar(!showSidebar)}
              className={`fixed top-4 left-4 z-50 p-3 rounded-lg ${darkMode ? 'bg-gray-800 text-white hover:bg-gray-700' : 'bg-white text-gray-700 hover:bg-gray-50'} shadow-lg`}
            >
              ☰
            </button>

            {/* スライドイン原稿一覧 */}
            {showSidebar && (
              <>
                {/* 背景オーバーレイ */}
                <div
                  className="fixed inset-0 bg-black bg-opacity-30 z-40"
                  onClick={() => setShowSidebar(false)}
                />
                
                {/* サイドバー */}
                <div className={`fixed left-0 top-0 h-full w-64 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} border-r p-4 z-50 shadow-2xl`}>
                  <div className="flex justify-between items-center mb-4">
                    <h3 className={`font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>原稿一覧</h3>
                    <button
                      onClick={addChapter}
                      className={`${darkMode ? 'text-blue-400 hover:text-blue-300' : 'text-blue-600 hover:text-blue-700'} text-xl`}
                    >
                      +
                    </button>
                  </div>
                  
                  <div className="space-y-2 mb-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                    {project.manuscripts.map((chapter) => (
                      <div
                        key={chapter.id}
                        draggable
                        onDragStart={() => handleDragStart(chapter)}
                        onDragOver={handleDragOver}
                        onDrop={() => handleDrop(chapter)}
                        className={`p-3 rounded-lg cursor-move transition group relative ${
                          selectedChapter?.id === chapter.id
                            ? darkMode ? 'bg-blue-900 border border-blue-700' : 'bg-blue-50 border border-blue-200'
                            : darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-50 hover:bg-gray-100'
                        }`}
                      >
                        {editingTitleId === chapter.id ? (
                          <input
                            type="text"
                            value={editingTitleText}
                            onChange={(e) => setEditingTitleText(e.target.value)}
                            onBlur={finishEditingTitle}
                            onKeyDown={handleTitleKeyDown}
                            className={`w-full text-sm font-medium px-2 py-1 rounded ${darkMode ? 'bg-gray-600 text-white' : 'bg-white text-gray-800'} border-2 border-blue-500`}
                            autoFocus
                            onClick={(e) => e.stopPropagation()}
                          />
                        ) : (
                          <div
                            onClick={() => {
                              setSelectedChapter(chapter);
                              setShowSidebar(false); // 選択したら閉じる
                            }}
                            onDoubleClick={() => startEditingTitle(chapter)}
                            className={`text-sm font-medium ${darkMode ? 'text-white' : 'text-gray-800'}`}
                          >
                            {chapter.title}
                          </div>
                        )}
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            deleteChapter(chapter.id);
                          }}
                          className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 text-xs"
                        >
                          削除
                        </button>
                      </div>
                    ))}
                  </div>

                  <div className="space-y-2 pt-4 border-t border-gray-600">
                    <button
                      onClick={exportAllToTxt}
                      className="w-full px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
                    >
                      📄 全原稿TXT出力
                    </button>
                    <label className="w-full px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm block text-center cursor-pointer">
                      📥 TXT読込
                      <input type="file" accept=".txt" onChange={importChapterFromTxt} className="hidden" />
                    </label>
                  </div>
                </div>
              </>
            )}

            <div className="writing-area" style={{ maxWidth: '900px' }}>
              <textarea
                value={selectedChapter.content}
                onChange={(e) => updateChapter(selectedChapter.id, 'content', e.target.value)}
                className={`flex-1 w-full bg-transparent border-none focus:outline-none resize-none ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}
                style={{ fontSize: `${fontSize}px`, lineHeight: lineHeight }}
                placeholder="本文を入力..."
              />
              
              <div className={`flex justify-between items-center text-sm ${darkMode ? 'text-gray-500' : 'text-gray-400'} flex-shrink-0`}>
                <div className="flex gap-2 items-center">
                  <button
                    onClick={() => setFontSize(Math.max(12, fontSize - 2))}
                    className={`px-2 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                  >
                    A-
                  </button>
                  <span className="text-xs">{fontSize}px</span>
                  <button
                    onClick={() => setFontSize(Math.min(32, fontSize + 2))}
                    className={`px-2 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                  >
                    A+
                  </button>
                </div>
                
                <div className="flex gap-4 items-center">
                  <button
                    onClick={() => setImmersiveMode(false)}
                    className={`px-3 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                  >
                    ← 通常モード
                  </button>
                  <button
                    onClick={exportChapterToTxt}
                    className={`px-3 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                  >
                    📄 TXT出力
                  </button>
                  <span>{getCharCount(selectedChapter.content)}字</span>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-full">
          {/* 章リスト */}
          <div className={`w-64 border-r p-4 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className="flex justify-between items-center mb-4">
              <h3 className={`font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>原稿一覧</h3>
              <button
                onClick={addChapter}
                className={`${darkMode ? 'text-blue-400 hover:text-blue-300' : 'text-blue-600 hover:text-blue-700'} text-xl`}
              >
                +
              </button>
            </div>
            
            <div className="space-y-2 mb-4">
              {project.manuscripts.map((chapter) => (
                <div
                  key={chapter.id}
                  draggable
                  onDragStart={() => handleDragStart(chapter)}
                  onDragOver={handleDragOver}
                  onDrop={() => handleDrop(chapter)}
                  className={`p-3 rounded-lg cursor-move transition group relative ${
                    selectedChapter?.id === chapter.id
                      ? darkMode ? 'bg-blue-900 border border-blue-700' : 'bg-blue-50 border border-blue-200'
                      : darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-50 hover:bg-gray-100'
                  }`}
                >
                  {editingTitleId === chapter.id ? (
                    <input
                      type="text"
                      value={editingTitleText}
                      onChange={(e) => setEditingTitleText(e.target.value)}
                      onBlur={finishEditingTitle}
                      onKeyDown={handleTitleKeyDown}
                      className={`w-full text-sm font-medium px-2 py-1 rounded ${darkMode ? 'bg-gray-600 text-white' : 'bg-white text-gray-800'} border-2 border-blue-500`}
                      autoFocus
                      onClick={(e) => e.stopPropagation()}
                    />
                  ) : (
                    <div
                      onClick={() => setSelectedChapter(chapter)}
                      onDoubleClick={() => startEditingTitle(chapter)}
                      className={`text-sm font-medium ${darkMode ? 'text-white' : 'text-gray-800'}`}
                    >
                      {chapter.title}
                    </div>
                  )}
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      deleteChapter(chapter.id);
                    }}
                    className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 text-xs"
                  >
                    削除
                  </button>
                </div>
              ))}
            </div>

            <div className="space-y-2 pt-4 border-t border-gray-600">
              <button
                onClick={exportAllToTxt}
                className="w-full px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
              >
                📄 全原稿TXT出力
              </button>
              <label className="w-full px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm block text-center cursor-pointer">
                📥 TXT読込
                <input type="file" accept=".txt" onChange={importChapterFromTxt} className="hidden" />
              </label>
            </div>
          </div>

          {/* エディタ */}
          <div className="flex-1 flex flex-col">
            {selectedChapter ? (
              <>
                {/* 固定ヘッダー */}
                <div className={`px-8 py-4 border-b flex-shrink-0 ${darkMode ? 'bg-gray-900 border-gray-700' : 'bg-gray-50 border-gray-200'}`}>
                  <div className={`max-w-4xl mx-auto flex justify-between items-center text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                    <div className="flex gap-2 items-center">
                      <button
                        onClick={() => setFontSize(Math.max(12, fontSize - 2))}
                        className={`px-2 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                      >
                        A-
                      </button>
                      <span className="text-xs">{fontSize}px</span>
                      <button
                        onClick={() => setFontSize(Math.min(32, fontSize + 2))}
                        className={`px-2 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                      >
                        A+
                      </button>
                    </div>
                    
                    <div className="flex gap-4 items-center">
                      <button
                        onClick={() => setImmersiveMode(true)}
                        className={`px-3 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                      >
                        🎯 没入モード
                      </button>
                      <button
                        onClick={() => {
                          const url = window.location.href + '?immersive=true&chapter=' + selectedChapter.id;
                          window.open(url, '_blank');
                        }}
                        className={`px-3 py-1 rounded ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-200'}`}
                      >
                        🪟 新しいタブで開く
                      </button>
                      <span className="font-medium">{getCharCount(selectedChapter.content)}字</span>
                    </div>
                  </div>
                </div>

                {/* テキストエリア */}
                <div className="flex-1 overflow-auto p-8">
                  <div className="max-w-4xl mx-auto">
                    <textarea
                      ref={textareaRef}
                      value={selectedChapter.content}
                      onChange={(e) => {
                        updateChapter(selectedChapter.id, 'content', e.target.value);
                        adjustTextareaHeight();
                      }}
                      className={`w-full px-4 py-2 bg-transparent border-0 focus:outline-none resize-none overflow-hidden ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}
                      style={{ fontSize: `${fontSize}px`, minHeight: '300px', lineHeight: lineHeight }}
                      placeholder="本文を入力..."
                    />
                  </div>
                </div>
              </>
            ) : (
              <div className={`flex items-center justify-center h-full ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                左から章を選択するか、新規作成してください
              </div>
            )}
          </div>
        </div>
      );
    }

    // 登場人物タブ
    function CharacterTab({ project, updateProject, darkMode, fontFamily }) {
      const [selectedCharacter, setSelectedCharacter] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [draggedCharacter, setDraggedCharacter] = useState(null);
      const fontClass = getFontClass(fontFamily);

      const addCharacter = () => {
        const newCharacters = [...project.characters];
        const newChar = {
          id: Date.now(),
          name: '',
          role: '',
          status: '',
          overview: '',
          speechStyle: ''
        };
        newCharacters.push(newChar);
        updateProject({ characters: newCharacters });
        setSelectedCharacter(newChar);
        setIsEditing(true);
      };

      const updateCharacter = (field, value) => {
        const updated = { ...selectedCharacter, [field]: value };
        setSelectedCharacter(updated);
        const newCharacters = project.characters.map(c =>
          c.id === updated.id ? updated : c
        );
        updateProject({ characters: newCharacters });
      };

      const deleteCharacter = (charId) => {
        const newCharacters = project.characters.filter(c => c.id !== charId);
        updateProject({ characters: newCharacters });
        if (selectedCharacter?.id === charId) {
          setSelectedCharacter(null);
          setIsEditing(false);
        }
      };

      const handleDragStart = (character) => {
        setDraggedCharacter(character);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (targetCharacter) => {
        if (!draggedCharacter || draggedCharacter.id === targetCharacter.id) return;

        const newCharacters = [...project.characters];
        const draggedIndex = newCharacters.findIndex(c => c.id === draggedCharacter.id);
        const targetIndex = newCharacters.findIndex(c => c.id === targetCharacter.id);

        newCharacters.splice(draggedIndex, 1);
        const finalTargetIndex = draggedIndex < targetIndex ? targetIndex - 1 : targetIndex;
        newCharacters.splice(finalTargetIndex, 0, draggedCharacter);

        updateProject({ characters: newCharacters });
        setDraggedCharacter(null);
      };

      const exportCharactersToTxt = () => {
        let content = `【${project.title} - 登場人物設定】\n\n`;
        project.characters.forEach(char => {
          content += `${'='.repeat(50)}\n`;
          content += `■ ${char.name || '未設定'} （${char.role || '役割なし'}）\n`;
          content += `${'='.repeat(50)}\n\n`;
          if (char.status) content += `身分・属性: ${char.status}\n\n`;
          if (char.overview) content += `【概要】\n${char.overview}\n\n`;
          if (char.speechStyle) content += `【口調例】\n${char.speechStyle}\n\n`;
          content += '\n';
        });
        
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${project.title}_登場人物.txt`;
        link.click();
      };

      return (
        <div className="flex h-full">
          {/* キャラクターリスト */}
          <div className={`w-80 border-r p-4 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className="flex justify-between items-center mb-4">
              <h3 className={`font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>登場人物一覧</h3>
              <button
                onClick={addCharacter}
                className="px-3 py-1 bg-blue-600 text-white rounded text-sm hover:bg-blue-700"
              >
                + 新しく登録する
              </button>
            </div>
            
            <div className="space-y-2 mb-4">
              {project.characters.map((character) => (
                <div
                  key={character.id}
                  draggable
                  onDragStart={() => handleDragStart(character)}
                  onDragOver={handleDragOver}
                  onDrop={() => handleDrop(character)}
                  onClick={() => {
                    setSelectedCharacter(character);
                    setIsEditing(false);
                  }}
                  className={`p-3 rounded-lg cursor-move transition group relative ${
                    selectedCharacter?.id === character.id
                      ? darkMode ? 'bg-blue-900 border border-blue-700' : 'bg-blue-50 border border-blue-200'
                      : darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-50 hover:bg-gray-100'
                  }`}
                >
                  <div className={`text-sm font-medium ${darkMode ? 'text-white' : 'text-gray-800'}`}>
                    {character.name || '未設定'}
                  </div>
                  {character.role && (
                    <div className={`text-xs mt-1 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                      {character.role}
                    </div>
                  )}
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      deleteCharacter(character.id);
                    }}
                    className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 text-xs"
                  >
                    削除
                  </button>
                </div>
              ))}
            </div>

            <button
              onClick={exportCharactersToTxt}
              className="w-full px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
            >
              📄 TXT出力
            </button>
          </div>

          {/* キャラクター詳細 */}
          <div className="flex-1 p-8 overflow-auto">
            {selectedCharacter ? (
              <div className="max-w-4xl mx-auto">
                {/* 編集/確認モード切り替えボタン */}
                <div className="flex justify-end mb-4">
                  <button
                    onClick={() => setIsEditing(!isEditing)}
                    className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-600 hover:bg-blue-700'} text-white`}
                  >
                    {isEditing ? '✓ 確認モード' : '✏️ 編集モード'}
                  </button>
                </div>

                {isEditing ? (
                  /* 編集モード */
                  <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-6 space-y-4`}>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                          名前 <span className="text-red-500">*</span>
                        </label>
                        <input
                          type="text"
                          value={selectedCharacter.name}
                          onChange={(e) => updateCharacter('name', e.target.value)}
                          className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : 'border-gray-300'}`}
                        />
                      </div>
                      <div>
                        <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                          役割
                        </label>
                        <input
                          type="text"
                          value={selectedCharacter.role}
                          onChange={(e) => updateCharacter('role', e.target.value)}
                          className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : 'border-gray-300'}`}
                          placeholder="例: 主人公、ヒロイン"
                        />
                      </div>
                    </div>

                    <div>
                      <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                        身分・属性
                      </label>
                      <input
                        type="text"
                        value={selectedCharacter.status}
                        onChange={(e) => updateCharacter('status', e.target.value)}
                        className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : 'border-gray-300'}`}
                        placeholder="例: 王族、魔法使い、学生"
                      />
                    </div>

                    <div>
                      <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                        概要
                      </label>
                      <textarea
                        value={selectedCharacter.overview}
                        onChange={(e) => updateCharacter('overview', e.target.value)}
                        className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none ${fontClass} ${darkMode ? 'bg-gray-700 border-gray-600 text-comfortable-dark' : 'border-gray-300 text-comfortable-light'}`}
                        rows="8"
                        placeholder="性格、特徴、背景、能力など、キャラクターの概要を記述..."
                      />
                    </div>

                    <div>
                      <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                        口調例
                      </label>
                      <textarea
                        value={selectedCharacter.speechStyle}
                        onChange={(e) => updateCharacter('speechStyle', e.target.value)}
                        className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none ${fontClass} ${darkMode ? 'bg-gray-700 border-gray-600 text-comfortable-dark' : 'border-gray-300 text-comfortable-light'}`}
                        rows="6"
                        placeholder="「〜だぜ」「〜ですわ」など、キャラクターの口調や話し方の例..."
                      />
                    </div>
                  </div>
                ) : (
                  /* 確認モード */
                  <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-8 space-y-6`}>
                    <div>
                      <h2 className={`text-3xl font-bold ${darkMode ? 'text-white' : 'text-gray-800'} mb-2`}>
                        {selectedCharacter.name || '未設定'}
                      </h2>
                      {selectedCharacter.role && (
                        <p className={`text-lg ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                          {selectedCharacter.role}
                        </p>
                      )}
                    </div>

                    {selectedCharacter.status && (
                      <div>
                        <h3 className={`text-sm font-bold ${darkMode ? 'text-gray-400' : 'text-gray-600'} mb-2`}>
                          身分・属性
                        </h3>
                        <p className={`${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                          {selectedCharacter.status}
                        </p>
                      </div>
                    )}

                    {selectedCharacter.overview && (
                      <div>
                        <h3 className={`text-lg font-bold ${darkMode ? 'text-gray-300' : 'text-gray-800'} mb-3 pb-2 border-b ${darkMode ? 'border-gray-600' : 'border-gray-200'}`}>
                          ■ 概要
                        </h3>
                        <p className={`whitespace-pre-wrap leading-relaxed ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}>
                          {selectedCharacter.overview}
                        </p>
                      </div>
                    )}

                    {selectedCharacter.speechStyle && (
                      <div>
                        <h3 className={`text-lg font-bold ${darkMode ? 'text-gray-300' : 'text-gray-800'} mb-3 pb-2 border-b ${darkMode ? 'border-gray-600' : 'border-gray-200'}`}>
                          ■ 口調例
                        </h3>
                        <p className={`whitespace-pre-wrap leading-relaxed ${fontClass} ${darkMode ? 'text-comfortable-dark' : 'text-comfortable-light'}`}>
                          {selectedCharacter.speechStyle}
                        </p>
                      </div>
                    )}

                    {!selectedCharacter.overview && !selectedCharacter.speechStyle && !selectedCharacter.status && (
                      <div className={`text-center py-12 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                        右上の「✏️ 編集モード」ボタンから情報を入力してください
                      </div>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div className={`flex items-center justify-center h-full ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                左からキャラクターを選択するか、新規登録してください
              </div>
            )}
          </div>
        </div>
      );
    }

    // 世界観タブ
    function WorldTab({ project, updateProject, darkMode, fontFamily, lineHeight }) {
      const [selectedSetting, setSelectedSetting] = useState(null);
      const [editingTitleId, setEditingTitleId] = useState(null);
      const [editingTitleText, setEditingTitleText] = useState('');
      const [draggedSetting, setDraggedSetting] = useState(null);
      const fontClass = getFontClass(fontFamily);
      const textareaRef = useRef(null);

      // テキストエリアの高さを自動調整する関数（スクロール位置を保持）
      const adjustTextareaHeight = () => {
        const textarea = textareaRef.current;
        if (textarea) {
          // スクロール位置を保存（親のoverflow-autoコンテナ）
          const scrollContainer = textarea.closest('.overflow-auto');
          const scrollTop = scrollContainer ? scrollContainer.scrollTop : 0;
          
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
          
          // スクロール位置を復元
          if (scrollContainer) {
            scrollContainer.scrollTop = scrollTop;
          }
        }
      };

      // テキストエリアの高さを初期化時のみ調整
      useEffect(() => {
        if (selectedSetting) {
          setTimeout(() => adjustTextareaHeight(), 0);
        }
      }, [selectedSetting?.id]);

      const addSetting = () => {
        const newSettings = [...project.worldSettings];
        const newSetting = {
          id: Date.now(),
          title: '未設定',
          content: ''
        };
        newSettings.push(newSetting);
        updateProject({ worldSettings: newSettings });
        setSelectedSetting(newSetting);
      };

      const updateSetting = (settingId, field, value) => {
        const newSettings = project.worldSettings.map(s =>
          s.id === settingId ? { ...s, [field]: value } : s
        );
        updateProject({ worldSettings: newSettings });
        if (selectedSetting && selectedSetting.id === settingId) {
          setSelectedSetting({ ...selectedSetting, [field]: value });
        }
      };

      const deleteSetting = (settingId) => {
        const newSettings = project.worldSettings.filter(s => s.id !== settingId);
        updateProject({ worldSettings: newSettings });
        if (selectedSetting?.id === settingId) {
          setSelectedSetting(null);
        }
      };

      const startEditingTitle = (setting) => {
        setEditingTitleId(setting.id);
        setEditingTitleText(setting.title);
      };

      const finishEditingTitle = () => {
        if (editingTitleId && editingTitleText.trim()) {
          updateSetting(editingTitleId, 'title', editingTitleText.trim());
        }
        setEditingTitleId(null);
        setEditingTitleText('');
      };

      const handleTitleKeyDown = (e) => {
        if (e.key === 'Enter') {
          finishEditingTitle();
        } else if (e.key === 'Escape') {
          setEditingTitleId(null);
          setEditingTitleText('');
        }
      };

      const handleDragStart = (setting) => {
        setDraggedSetting(setting);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (targetSetting) => {
        if (!draggedSetting || draggedSetting.id === targetSetting.id) return;

        const newSettings = [...project.worldSettings];
